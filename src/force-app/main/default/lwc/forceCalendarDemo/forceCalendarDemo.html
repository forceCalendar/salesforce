<template>
    <lightning-card title="ForceCalendar Demo" icon-name="standard:event">
        <div slot="actions">
            <lightning-button-group>
                <lightning-button
                    label="Load Sample Events"
                    onclick={handleLoadSampleEvents}
                    icon-name="utility:refresh"
                ></lightning-button>
                <lightning-button
                    label="Clear"
                    onclick={handleClearEvents}
                    icon-name="utility:clear"
                ></lightning-button>
            </lightning-button-group>
        </div>

        <!-- Calendar Container -->
        <div class="slds-p-around_medium">
            <div class="calendar-container" lwc:dom="manual"></div>
        </div>
    </lightning-card>
</template>
